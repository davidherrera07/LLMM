<!DOCTYPE html>
<html>
<body>

    <p>This is the first paragraph.</p>
    <p>This is the second paragraph.</p>
    <p>This is the third paragraph.</p>

    <button onclick="displayParagraphs()">Show Paragraphs in Div</button>

    <div id="output" style="margin-top:20px; padding:10px; border:1px solid black; background:#f9f9f9;">
        The content will appear here...
    </div>

    <script>
        function displayParagraphs() {
            // 1. Get all paragraph elements
            const paragraphs = document.getElementsByTagName("p");
            const displayDiv = document.getElementById("output");
            
            let content = "";

            // 2. Loop through the HTMLCollection
            for (let i = 0; i < paragraphs.length; i++) {
                content += paragraphs[i].innerText + "<br>";
            }

            // 3. Update the div content
            displayDiv.innerHTML = content;
        }
    </script>

</body>
</html>
