<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OnLoad Greeting</title>
</head>
<body onload="welcomeUser()">

    <h1>My Awesome Website</h1>
    <p>Wait for the page to load to see the greeting.</p>

    <script>
        function welcomeUser() {
            // This function runs automatically once the body has loaded
            alert("Hello! Welcome to my page. Hope you have a great stay!");
            
            // You can also write to the console or the page
            console.log("Greeting executed successfully.");
        }
    </script>

</body>
</html>
