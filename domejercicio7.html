<!DOCTYPE html>
<html>
<body>

    <h2>Click to add an Image</h2>
    <button onclick="addNewImage()">Add Image Now</button>

    <div id="target-div" style="margin-top: 20px;">
        </div>

    <script>
        function addNewImage() {
            // Create the element
            const img = document.createElement("img");
            
            // Set the source (using a random image service)
            img.src = "https://picsum.photos/150";
            img.style.margin = "10px";
            img.style.border = "2px solid #333";

            // Append it to the div
            document.getElementById("target-div").appendChild(img);
        }
    </script>

</body>
</html>
