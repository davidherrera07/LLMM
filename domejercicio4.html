<!DOCTYPE html>
<html>
<body>

    <h2>My Grocery List</h2>
    <ul id="myList">
        <li>Coffee</li>
        <li>Milk</li>
        <li>Bread</li>
        <li>Eggs</li>
    </ul>

    <button onclick="removeItem()">Remove First Item</button>

    <script>
        function removeItem() {
            // 1. Identify the parent
            const list = document.getElementById("myList");

            // 2. Check if the parent has any children
            if (list.hasChildNodes()) {
                // 3. Remove the first child
                list.removeChild(list.children[0]);
            } else {
                alert("The list is already empty!");
            }
        }
    </script>

</body>
</html>
