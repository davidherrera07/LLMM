<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Prueba DOM</title>
</head>
<body>

    <h1>Practicando Propiedades del Documento</h1>
    <p>Esta página sirve para probar comandos en la consola.</p>

    <section>
        <h2>Imágenes</h2>
        <img src="https://via.placeholder.com/150" alt="Imagen 1">
        <img src="https://via.placeholder.com/150" alt="Imagen 2">
    </section>

    <section>
        <h2>Enlaces de Interés</h2>
        <ul>
            <li><a href="https://www.google.com">Ir a Google</a></li>
            <li><a href="https://www.w3schools.com">Aprender en W3Schools</a></li>
            <li><a href="https://developer.mozilla.org">Documentación MDN</a></li>
        </ul>
    </section>

    <script>
        // Esto mostrará los datos automáticamente al cargar la página
        console.log("--- Datos cargados automáticamente ---");
        console.log("Título:", document.title);
        console.log("Número de imágenes:", document.images.length);
        console.log("Número de enlaces:", document.links.length);
    </script>

</body>
</html>
