<!DOCTYPE html>
<html>
<body>

    <h2>Dynamic Image Creation</h2>
    <div id="image-container" style="border: 2px dashed #ccc; padding: 10px; min-height: 100px;">
        </div>

    <button onclick="addImage()">Add Image</button>

    <script>
        function addImage() {
            // 1. Create the new element
            const newImg = document.createElement("img");

            // 2. Set attributes
            newImg.src = "https://picsum.photos/200";
            newImg.alt = "Random Image";
            newImg.style.display = "block";
            newImg.style.marginTop = "10px";

            // 3. Find the parent and append the child
            const container = document.getElementById("image-container");
            container.appendChild(newImg);
        }
    </script>

</body>
</html>
