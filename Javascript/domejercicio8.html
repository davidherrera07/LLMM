<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timeout Message</title>
</head>
<body>

    <h1>Patience Exercise</h1>
    <p>Please wait 5 seconds. A message will appear automatically.</p>

    <script>
        // Use setTimeout to trigger the function after 5000 milliseconds
        setTimeout(showAlert, 5000);

        function showAlert() {
            alert("5 seconds have passed! Thanks for waiting.");
        }
    </script>

</body>
</html>
