<!DOCTYPE html>
<html>
<head>
    <title>Image Selector</title>
    <script>
        function cambiaCoche(nombre) {
            document.getElementById('miImagen').src = nombre;   
        }
    </script>
</head>
<body>
    <h2>Imágenes de coches</h2>

    <img id="miImagen" src="coche1.jpg" style="height:300px"><br>

    <select onchange="cambiaCoche(this.value)">
        <option value="coche1.jpg">Coche 1</option>
        <option value="coche2.jpg">Coche 2</option>
        <option value="coche3.jpg">Coche 3</option>
    </select>
</body>
</html>
