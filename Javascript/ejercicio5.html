<!DOCTYPE html>
<html>
<head>
    <title>Exercise 5</title>
    <script>
        function changeFont(font) {
            document.getElementById("para").style.fontFamily = font;
        }

        function changeImage(src) {
            document.getElementById("myImg").src = src;
        }

        function showMessage(msg) {
            document.getElementById("msgDiv").innerHTML = msg;
        }
    </script>
</head>
<body>

<h2>Change paragraph style:</h2>
<p id="para">This is a sample paragraph.</p>
<button onclick="changeFont('Arial')">Arial</button>
<button onclick="changeFont('Courier New')">Courier</button>
<button onclick="changeFont('Times New Roman')">Times</button>

<h2>Change image:</h2>
<img id="myImg" src="image1.jpg" style="height:200px;"><br>
<button onclick="changeImage('image1.jpg')">Image 1</button>
<button onclick="changeImage('image2.jpg')">Image 2</button>
<button onclick="changeImage('image3.jpg')">Image 3</button>

<h2>Show messages:</h2>
<div id="msgDiv"></div>
<button onclick="showMessage('Message 1')">Message 1</button>
<button onclick="showMessage('Message 2')">Message 2</button>
<button onclick="showMessage('Message 3')">Message 3</button>

</body>
</html>
